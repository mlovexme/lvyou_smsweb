services:
  lvyou-smsweb:
    image: lovexme/lvyou-smsweb:latest
    container_name: lvyou-smsweb
    restart: unless-stopped
    network_mode: host  # 必须使用 host 网络模式才能扫描局域网
    environment:
      # 基础配置
      - SERVER_PORT=8000
      - BMUIUSER=admin
      - BMUIPASS=${BMUIPASS:?请先设置 BMUIPASS 环境变量}
      - BMINSECURE_DEFAULT_PASSWORD=0
      # 性能配置
      - BMHTTPTIMEOUT=5.0
      - BMSCANCONCURRENCY=64
      - BMTCPCONCURRENCY=128
      - BMSCANRETRIES=3
      - BMSCANTTL=3600
      - BMCONFIGBATCHMAX=64
      
      # 安全配置
      - BMSMSRATELIMIT=10
      - BMDIALRATELIMIT=5
      - BMLOGINRATELIMIT=5
      - BMSMSMAXLEN=500
      
      # CORS 配置
      - BMALLOWORIGINS=${BMALLOWORIGINS:-}
    volumes:
      - ./data:/opt/board-manager/data
    # FIX(P2#10): the previous healthcheck only verified that the HTTP
    # listener answered 200 on /api/health. The endpoint now also pings
    # the SQLite DB and returns 503 on failure, so an unhealthy state
    # actually catches stuck-but-listening processes / broken volume
    # mounts. start_period bumped to 30s so cold-boot DB init / first
    # SQLAlchemy connect doesn't trip the early checks.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://localhost:$$SERVER_PORT/api/health\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s