name: Manual Push v3.4.0

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v3.4.0)'
        required: true
        default: 'v3.4.0'
        type: string

env:
  DOCKER_IMAGE: lovexme/lvyou-smsweb
  DOCKER_USERNAME: lovexme

jobs:
  push-specific-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push version tag
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.event.inputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify push
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️  Version: ${{ github.event.inputs.version }}"
