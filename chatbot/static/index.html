<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiMo AI 助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Code highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" :class="{ collapsed: sidebarCollapsed }">
      <div class="sidebar-header">
        <button class="btn-new-chat" @click="newConversation">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span v-if="!sidebarCollapsed">新对话</span>
        </button>
        <button class="btn-collapse" @click="sidebarCollapsed = !sidebarCollapsed">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 4h12M3 9h12M3 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-list" v-if="!sidebarCollapsed">
        <div v-for="conv in conversations" :key="conv.id"
             class="conv-item" :class="{ active: currentConvId === conv.id }"
             @click="selectConversation(conv.id)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" class="conv-icon">
            <path d="M2 3a1 1 0 011-1h10a1 1 0 011 1v8a1 1 0 01-1 1H5l-3 3V3z" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span class="conv-title">{{ conv.title || '新对话' }}</span>
          <button class="btn-delete" @click.stop="deleteConversation(conv.id)" title="删除">
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div v-if="conversations.length === 0" class="conv-empty">暂无对话</div>
      </div>
      <div class="sidebar-footer" v-if="!sidebarCollapsed">
        <div class="status-dot" :class="relayConnected ? 'online' : 'offline'"></div>
        <span>{{ relayConnected ? 'AI 服务已连接' : 'AI 服务未连接' }}</span>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <!-- Welcome screen -->
      <div v-if="!currentConvId && messages.length === 0" class="welcome">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="url(#grad)" stroke-width="2"/>
            <path d="M16 20a2 2 0 114 0 2 2 0 01-4 0zM28 20a2 2 0 114 0 2 2 0 01-4 0zM17 28c1.5 3 4 5 7 5s5.5-2 7-5" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>
            <defs><linearGradient id="grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
          </svg>
        </div>
        <h1 class="welcome-title">MiMo AI 助手</h1>
        <p class="welcome-sub">欢迎使用，请输入您的问题</p>
      </div>

      <!-- Chat messages -->
      <div class="chat-messages" ref="chatMessages">
        <div v-for="(msg, i) in messages" :key="i" class="message" :class="msg.role">
          <div class="message-avatar">
            <span v-if="msg.role === 'user'">你</span>
            <span v-else>AI</span>
          </div>
          <div class="message-body">
            <div class="message-content" v-html="renderMarkdown(msg.content)"></div>
          </div>
        </div>
        <div v-if="loading" class="message assistant">
          <div class="message-avatar"><span>AI</span></div>
          <div class="message-body">
            <div class="message-content typing">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-box">
          <textarea
            ref="inputArea"
            v-model="userInput"
            :placeholder="loading ? 'AI 正在思考...' : '请输入您的问题...'"
            :disabled="loading"
            @keydown.enter.exact.prevent="sendMessage"
            rows="1"
            @input="autoResize"
          ></textarea>
          <div class="input-toolbar">
            <div class="toolbar-left">
              <div class="model-select" @click.stop="showModelDropdown = !showModelDropdown">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
                <span>{{ currentModelName }}</span>
                <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                <div class="model-dropdown" v-if="showModelDropdown" @click.stop>
                  <div v-for="m in models" :key="m.id"
                       class="model-option" :class="{ active: selectedModel === m.id }"
                       @click="selectModel(m.id)">
                    <div class="model-name">{{ m.name || m.id }}</div>
                    <div class="model-desc" v-if="m.desc">{{ m.desc }}</div>
                  </div>
                </div>
              </div>
              <label class="toggle-item" :class="{ active: deepThinking }">
                <input type="checkbox" v-model="deepThinking">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M8 2a6 6 0 00-6 6c0 2.2 1.2 4.1 3 5.1V14a1 1 0 001 1h4a1 1 0 001-1v-.9c1.8-1 3-2.9 3-5.1a6 6 0 00-6-6z" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                <span>深度思考</span>
              </label>
            </div>
            <button class="btn-send" @click="sendMessage" :disabled="loading || !userInput.trim()">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M2 9l14-7-4 16-4-6z" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-footer">内容由 AI 生成，请仔细甄别</div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
